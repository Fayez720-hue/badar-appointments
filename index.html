<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة العقارات - معاينات ومتابعات</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ar.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%); min-height: 100vh; padding: 12px; direction: rtl; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        .header { background: rgba(255,255,255,0.97); border-radius: 20px; padding: 12px 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; background: linear-gradient(135deg, #c9a03d, #8b6914); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .filter-group { display: flex; gap: 6px; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 40px; }
        .filter-btn { padding: 6px 12px; border-radius: 30px; border: none; cursor: pointer; font-size: 0.75rem; background: transparent; }
        .filter-btn.active { background: linear-gradient(135deg, #c9a03d, #8b6914); color: white; }
        .refresh-btn { background: linear-gradient(135deg, #c9a03d, #8b6914); border: none; color: white; padding: 8px 14px; border-radius: 30px; cursor: pointer; margin-left: 8px; }
        .status-badge { background: #eef2ff; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px; border-right: 3px solid #c9a03d; cursor: pointer; }
        .stat-number { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #c9a03d, #8b6914); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .two-columns { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 768px) { .two-columns { flex-direction: row; } }
        
        .calendar-panel, .events-panel { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 16px; }
        .calendar-panel { flex: 2; }
        .events-panel { flex: 1.2; }
        
        .event-list { max-height: 500px; overflow-y: auto; }
        .event-item { background: #f9fbfa; margin-bottom: 8px; padding: 12px; border-radius: 12px; border-right: 3px solid #c9a03d; cursor: pointer; transition: all 0.2s; }
        .event-item.callback { border-right-color: #e67e22; background: #fffbf0; }
        .event-item:hover { transform: translateX(-5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .event-title { font-weight: 700; font-size: 0.9rem; display: flex; justify-content: space-between; margin-bottom: 6px; }
        .event-type { font-size: 0.65rem; padding: 2px 8px; border-radius: 15px; background: #fef8e7; }
        .event-type.callback-badge { background: #ffecb3; color: #b45f06; }
        .event-details { font-size: 0.7rem; color: #4a5b54; }
        
        .fc { direction: rtl; }
        .fc .fc-toolbar { flex-direction: column; gap: 8px; margin-bottom: 15px; }
        @media (min-width: 768px) { .fc .fc-toolbar { flex-direction: row; } }
        
        .debug-panel { background: #1e1e2e; color: #a6e3a1; font-family: monospace; font-size: 11px; padding: 12px; margin-top: 16px; border-radius: 12px; max-height: 200px; overflow-y: auto; direction: ltr; }
        .debug-line.success { color: #a6e3a1; }
        .debug-line.error { color: #f38ba8; }
        .debug-line.warning { color: #f9e2af; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #fef8e7; border-top: 3px solid #c9a03d; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer-note { margin-top: 16px; text-align: center; font-size: 0.65rem; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.2); padding: 8px; border-radius: 20px; }
        
        @media (min-width: 768px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <h1><i class="fas fa-building"></i> نظام إدارة العقارات <small>معاينات ومتابعات</small></h1>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">📋 الكل</button>
                <button class="filter-btn" data-filter="appointment">🏢 معاينات</button>
                <button class="filter-btn" data-filter="callback">📞 متابعات</button>
            </div>
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
            <span class="status-badge" id="status">⏳ جاري...</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>🏢 إجمالي المعاينات</h3><div class="stat-number" id="totalApp">0</div></div>
        <div class="stat-card"><h3>📞 إجمالي المتابعات</h3><div class="stat-number" id="totalCb">0</div></div>
        <div class="stat-card"><h3>📅 معاينات اليوم</h3><div class="stat-number" id="todayApp">0</div></div>
        <div class="stat-card"><h3>⏰ متابعات اليوم</h3><div class="stat-number" id="todayCb">0</div></div>
    </div>

    <div class="two-columns">
        <div class="calendar-panel"><div class="section-title">📆 تقويم المواعيد</div><div id="calendar"><div class="loading"><div class="spinner"></div></div></div></div>
        <div class="events-panel"><div class="section-title">📋 قائمة المواعيد</div><div id="eventList"><div class="loading"><div class="spinner"></div></div></div></div>
    </div>
    
    <div class="footer-note"><i class="fas fa-info-circle"></i> المعاينات من العمود O | المتابعات من العمود S (Callback Date Appointment)</div>
    
    <div class="debug-panel" id="debugPanel">
        <div id="debugLog">🔄 جاري تحميل البيانات...</div>
    </div>
</div>

<script>
    // ======================= إعدادات Google Sheets =======================
    const SPREADSHEET_ID = '1oZMWwvTHATw4Eoehm6URoysFwp3ylm8Bb0udy-qG1zg';
    const SHEET_NAME = 'مبيعات';
    const API_KEY = 'AIzaSyCkoMx_6tPVCPpnnBCzoQjNYovnVaRgjbM';
    
    // الأعمدة
    const COL_NAME = 1;           // B - الاسم
    const COL_PHONE = 2;          // C - الموبايل
    const COL_CITY = 6;           // G - المحافظة
    const COL_ADDRESS = 7;        // H - العنوان
    const COL_NOTES = 8;          // I - ملاحظات
    const COL_APPOINTMENT_DATE = 14;  // O - تاريخ المعاينة
    const COL_APPOINTMENT_TIME = 15;  // P - وقت المعاينة
    const COL_CALLBACK_DATE = 18;     // S - Callback Date Appointment (المتابعات)
    const COL_CALLBACK_NOTES = 19;    // T - ملاحظات المتابعة
    
    let allEvents = [];
    let filteredEvents = [];
    let calendar = null;
    let currentFilter = 'all';
    
    const TYPE_APPOINTMENT = 'معاينة';
    const TYPE_CALLBACK = 'متابعة';
    
    function log(message, type = 'info') {
        const logDiv = document.getElementById('debugLog');
        const timestamp = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.className = `debug-line ${type}`;
        line.innerHTML = `[${timestamp}] ${message}`;
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${timestamp}] ${message}`);
        while (logDiv.children.length > 50) logDiv.removeChild(logDiv.firstChild);
    }
    
    // تحويل التاريخ من تنسيق "الجمعة, 27/02/2026" أو "3/01/2026" إلى Date
    function parseDate(dateStr) {
        if (!dateStr) return null;
        
        let original = dateStr.toString().trim();
        
        // إزالة اسم اليوم إذا وجد
        let cleaned = original.replace(/^(السبت|الأحد|الاثنين|الثلاثاء|الأربعاء|الخميس|الجمعة),\s*/i, '');
        
        // تنسيق DD/MM/YYYY
        let parts = cleaned.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (parts) {
            let day = parseInt(parts[1]);
            let month = parseInt(parts[2]) - 1;
            let year = parseInt(parts[3]);
            let dateObj = new Date(year, month, day, 12, 0);
            if (!isNaN(dateObj.getTime())) {
                return dateObj;
            }
        }
        
        // تنسيق D/M/YYYY
        parts = cleaned.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (parts) {
            let day = parseInt(parts[1]);
            let month = parseInt(parts[2]) - 1;
            let year = parseInt(parts[3]);
            let dateObj = new Date(year, month, day, 12, 0);
            if (!isNaN(dateObj.getTime())) {
                return dateObj;
            }
        }
        
        return null;
    }
    
    // تنسيق الوقت
    function formatTime(timeStr) {
        if (!timeStr) return '';
        let clean = timeStr.toString().trim();
        let match = clean.match(/(\d{1,2}):(\d{2})/);
        if (match) {
            let hour = parseInt(match[1]);
            let minute = parseInt(match[2]);
            let hour12 = hour % 12 || 12;
            let period = hour < 12 ? 'ص' : 'م';
            return `${hour12}:${minute.toString().padStart(2, '0')} ${period}`;
        }
        return clean;
    }
    
    async function fetchData() {
        log('════════════════════════════════════════', 'info');
        log('🚀 بدء جلب البيانات من Google Sheets', 'info');
        
        const statusSpan = document.getElementById('status');
        statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
        
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A1:Z500?key=${API_KEY}`;
            const response = await fetch(url);
            
            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error("خطأ 403: تأكد من مشاركة الجدول كـ 'عام'");
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            const rows = data.values;
            
            if (!rows || rows.length < 2) {
                throw new Error("لا توجد بيانات في الجدول");
            }
            
            log(`✅ تم جلب ${rows.length} صف من البيانات`, 'success');
            
            // عرض العناوين للتأكد
            if (rows[0]) {
                log(`📋 العمود O (تاريخ المعاينة): "${rows[0][COL_APPOINTMENT_DATE] || 'فارغ'}"`, 'info');
                log(`📋 العمود S (تاريخ المتابعة): "${rows[0][COL_CALLBACK_DATE] || 'فارغ'}"`, 'info');
            }
            
            const events = [];
            let appointmentCount = 0;
            let callbackCount = 0;
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;
                
                const name = row[COL_NAME] || 'غير محدد';
                const phone = row[COL_PHONE] || '';
                const city = row[COL_CITY] || '';
                const address = row[COL_ADDRESS] || '';
                const notes = row[COL_NOTES] || '';
                
                // ========== المعاينات من العمود O ==========
                const appointmentDate = row[COL_APPOINTMENT_DATE];
                const appointmentTime = row[COL_APPOINTMENT_TIME] || '';
                
                if (appointmentDate && appointmentDate.toString().trim()) {
                    const dateObj = parseDate(appointmentDate);
                    if (dateObj) {
                        events.push({
                            id: `app_${i}`,
                            title: name,
                            type: TYPE_APPOINTMENT,
                            date: dateObj,
                            time: formatTime(appointmentTime),
                            phone: phone,
                            city: city,
                            address: address,
                            notes: notes
                        });
                        appointmentCount++;
                        log(`✅ معاينة: ${name} - ${appointmentDate}`, 'success');
                    }
                }
                
                // ========== المتابعات من العمود S ==========
                const callbackDate = row[COL_CALLBACK_DATE];
                const callbackNotes = row[COL_CALLBACK_NOTES] || '';
                
                if (callbackDate && callbackDate.toString().trim()) {
                    const dateObj = parseDate(callbackDate);
                    if (dateObj) {
                        events.push({
                            id: `cb_${i}`,
                            title: name,
                            type: TYPE_CALLBACK,
                            date: dateObj,
                            time: '',
                            phone: phone,
                            city: city,
                            address: address,
                            notes: callbackNotes || notes || 'متابعة'
                        });
                        callbackCount++;
                        log(`✅ متابعة: ${name} - ${callbackDate}`, 'success');
                    } else {
                        log(`⚠️ فشل تحويل تاريخ متابعة: "${callbackDate}"`, 'warning');
                    }
                }
            }
            
            log(`📊 النتائج: ${appointmentCount} معاينة, ${callbackCount} متابعة, المجموع: ${events.length}`, 'success');
            
            if (events.length === 0) {
                log(`⚠️ لم يتم العثور على أي مواعيد!`, 'warning');
            }
            
            statusSpan.innerHTML = `✅ ${events.length} موعد`;
            return events;
            
        } catch (error) {
            log(`❌ خطأ: ${error.message}`, 'error');
            statusSpan.innerHTML = '❌ فشل الجلب';
            return [];
        }
    }
    
    function updateStats(events) {
        const totalApp = events.filter(e => e.type === TYPE_APPOINTMENT).length;
        const totalCb = events.filter(e => e.type === TYPE_CALLBACK).length;
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const todayApp = events.filter(e => {
            if (e.type !== TYPE_APPOINTMENT) return false;
            const evDate = new Date(e.date);
            evDate.setHours(0, 0, 0, 0);
            return evDate.getTime() === today.getTime();
        }).length;
        
        const todayCb = events.filter(e => {
            if (e.type !== TYPE_CALLBACK) return false;
            const evDate = new Date(e.date);
            evDate.setHours(0, 0, 0, 0);
            return evDate.getTime() === today.getTime();
        }).length;
        
        document.getElementById('totalApp').innerText = totalApp;
        document.getElementById('totalCb').innerText = totalCb;
        document.getElementById('todayApp').innerText = todayApp;
        document.getElementById('todayCb').innerText = todayCb;
    }
    
    function renderEventList(events) {
        const container = document.getElementById('eventList');
        if (events.length === 0) {
            container.innerHTML = '<div class="loading"><p>لا توجد مواعيد</p></div>';
            return;
        }
        
        // ترتيب حسب التاريخ
        const sorted = [...events].sort((a, b) => a.date - b.date);
        
        let html = '';
        for (const ev of sorted) {
            const dateStr = ev.date.toLocaleDateString('ar-EG', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
            const isCallback = ev.type === TYPE_CALLBACK;
            html += `<div class="event-item ${isCallback ? 'callback' : ''}" onclick="alert('${ev.title}\\n📅 ${dateStr}${ev.time ? ' 🕐 ' + ev.time : ''}\\n📞 ${ev.phone || 'غير متوفر'}\\n📍 ${ev.city || ''} ${ev.address || ''}\\n📝 ${ev.notes || ''}')">
                <div class="event-title">
                    <span><i class="fas ${isCallback ? 'fa-phone-alt' : 'fa-building'}"></i> ${ev.title}</span>
                    <span class="event-type ${isCallback ? 'callback-badge' : ''}">${ev.type}</span>
                </div>
                <div class="event-details">
                    📅 ${dateStr} ${ev.time ? `🕐 ${ev.time}` : ''}<br>
                    📞 ${ev.phone || 'غير متوفر'}
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }
    
    function initCalendar(events) {
        const calendarEl = document.getElementById('calendar');
        if (calendar) calendar.destroy();
        
        if (events.length === 0) {
            calendarEl.innerHTML = '<div class="loading"><p>لا توجد مواعيد</p></div>';
            return;
        }
        
        const fcEvents = events.map(ev => ({
            id: ev.id,
            title: `${ev.type === TYPE_APPOINTMENT ? '🏢' : '📞'} ${ev.title}`,
            start: ev.date,
            backgroundColor: ev.type === TYPE_APPOINTMENT ? '#c9a03d' : '#e67e22',
            extendedProps: { phone: ev.phone, city: ev.city, address: ev.address, notes: ev.notes, type: ev.type, time: ev.time }
        }));
        
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ar',
            direction: 'rtl',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: window.innerWidth < 768 ? '' : 'dayGridMonth,listWeek'
            },
            buttonText: { today: 'اليوم', month: 'شهر', week: 'أسبوع', list: 'قائمة' },
            events: fcEvents,
            eventClick: (info) => {
                const ev = info.event;
                const ext = ev.extendedProps;
                alert(`${ev.title}\n📅 ${ev.start.toLocaleDateString('ar-EG')}${ext.time ? ' 🕐 ' + ext.time : ''}\n📞 ${ext.phone || 'غير متوفر'}\n📍 ${ext.city || ''} ${ext.address || ''}\n📝 ${ext.notes || ''}`);
            },
            height: 'auto',
            firstDay: 6
        });
        calendar.render();
        log(`📅 تم تحديث التقويم بـ ${fcEvents.length} موعد`, 'success');
    }
    
    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === filter);
        });
        
        if (filter === 'all') filteredEvents = [...allEvents];
        else if (filter === 'appointment') filteredEvents = allEvents.filter(e => e.type === TYPE_APPOINTMENT);
        else filteredEvents = allEvents.filter(e => e.type === TYPE_CALLBACK);
        
        updateStats(filteredEvents);
        renderEventList(filteredEvents);
        initCalendar(filteredEvents);
    }
    
    async function refreshDashboard() {
        const events = await fetchData();
        allEvents = events;
        filteredEvents = [...events];
        updateStats(filteredEvents);
        renderEventList(filteredEvents);
        initCalendar(filteredEvents);
    }
    
    window.addEventListener('load', () => {
        log('🚀 بدء تشغيل التطبيق - نظام إدارة العقارات', 'success');
        log(`📍 المعاينات من العمود O (index ${COL_APPOINTMENT_DATE})`, 'info');
        log(`📍 المتابعات من العمود S (index ${COL_CALLBACK_DATE})`, 'info');
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });
        document.getElementById('refreshBtn').addEventListener('click', refreshDashboard);
        refreshDashboard();
        setInterval(refreshDashboard, 300000);
    });
</script>
</body>
</html>
