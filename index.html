<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة العقارات - المعاينات</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ar.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%); min-height: 100vh; padding: 12px; direction: rtl; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        .header { background: rgba(255,255,255,0.97); border-radius: 20px; padding: 12px 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; background: linear-gradient(135deg, #c9a03d, #8b6914); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .refresh-btn { background: linear-gradient(135deg, #c9a03d, #8b6914); border: none; color: white; padding: 8px 14px; border-radius: 30px; cursor: pointer; margin-right: 10px; }
        .status-badge { background: #eef2ff; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px; border-right: 3px solid #c9a03d; }
        .stat-number { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #c9a03d, #8b6914); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .two-columns { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 768px) { .two-columns { flex-direction: row; } }
        
        .calendar-panel, .events-panel { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 16px; }
        .calendar-panel { flex: 2; }
        .events-panel { flex: 1.2; }
        
        .event-list { max-height: 400px; overflow-y: auto; }
        .event-item { background: #f9fbfa; margin-bottom: 8px; padding: 10px; border-radius: 12px; border-right: 3px solid #c9a03d; cursor: pointer; }
        .event-item:hover { transform: translateX(-5px); }
        
        .fc { direction: rtl; }
        .fc .fc-toolbar { flex-direction: column; gap: 8px; margin-bottom: 15px; }
        @media (min-width: 768px) { .fc .fc-toolbar { flex-direction: row; } }
        
        .debug-panel { background: #1e1e2e; color: #a6e3a1; font-family: monospace; font-size: 11px; padding: 12px; margin-top: 16px; border-radius: 12px; max-height: 250px; overflow-y: auto; direction: ltr; }
        .debug-line.success { color: #a6e3a1; }
        .debug-line.error { color: #f38ba8; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #fef8e7; border-top: 3px solid #c9a03d; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer-note { margin-top: 16px; text-align: center; font-size: 0.65rem; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.2); padding: 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <h1><i class="fas fa-building"></i> نظام إدارة العقارات - المعاينات</h1>
        <div>
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
            <span class="status-badge" id="status">⏳ جاري...</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>🏢 إجمالي المعاينات</h3><div class="stat-number" id="totalApp">0</div></div>
        <div class="stat-card"><h3>📅 معاينات اليوم</h3><div class="stat-number" id="todayApp">0</div></div>
        <div class="stat-card"><h3>🗓️ معاينات هذا الأسبوع</h3><div class="stat-number" id="weekApp">0</div></div>
        <div class="stat-card"><h3>⏰ معاينات الشهر</h3><div class="stat-number" id="monthApp">0</div></div>
    </div>

    <div class="two-columns">
        <div class="calendar-panel"><div class="section-title">📆 تقويم المعاينات</div><div id="calendar"><div class="loading"><div class="spinner"></div></div></div></div>
        <div class="events-panel"><div class="section-title">📋 قائمة المعاينات</div><div id="eventList"><div class="loading"><div class="spinner"></div></div></div></div>
    </div>
    
    <div class="footer-note"><i class="fas fa-info-circle"></i> يتم استخراج البيانات من العمود O (تاريخ المعاينة)</div>
    
    <div class="debug-panel" id="debugPanel">
        <div id="debugLog">🔄 جاري تحميل البيانات...</div>
    </div>
</div>

<script>
    // ======================= إعدادات Google Sheets =======================
    const SPREADSHEET_ID = '1oZMWwvTHATw4Eoehm6URoysFwp3ylm8Bb0udy-qG1zg';
    const SHEET_NAME = 'مبيعات';
    const API_KEY = 'AIzaSyCkoMx_6tPVCPpnnBCzoQjNYovnVaRgjbM';
    
    let allEvents = [];
    let calendar = null;
    
    function log(message, type = 'info') {
        const logDiv = document.getElementById('debugLog');
        const timestamp = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.className = `debug-line ${type}`;
        line.innerHTML = `[${timestamp}] ${message}`;
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${timestamp}] ${message}`);
        while (logDiv.children.length > 50) logDiv.removeChild(logDiv.firstChild);
    }
    
    // تحويل التاريخ من تنسيق "الجمعة, 27/02/2026" إلى Date object
    function parseDate(dateStr) {
        if (!dateStr) return null;
        
        let original = dateStr.toString().trim();
        log(`📅 تحويل: "${original}"`, 'info');
        
        // إزالة اسم اليوم
        let cleaned = original.replace(/^(السبت|الأحد|الاثنين|الثلاثاء|الأربعاء|الخميس|الجمعة),\s*/i, '');
        
        // تنسيق DD/MM/YYYY
        let parts = cleaned.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (parts) {
            let day = parseInt(parts[1]);
            let month = parseInt(parts[2]) - 1;
            let year = parseInt(parts[3]);
            let dateObj = new Date(year, month, day, 12, 0);
            if (!isNaN(dateObj.getTime())) {
                log(`   ✅ ${day}/${month+1}/${year} -> ${dateObj.toLocaleDateString('ar-EG')}`, 'success');
                return dateObj;
            }
        }
        
        log(`   ❌ فشل تحويل: "${original}"`, 'error');
        return null;
    }
    
    async function fetchData() {
        log('════════════════════════════════════════', 'info');
        log('🚀 بدء جلب البيانات من Google Sheets', 'info');
        
        const statusSpan = document.getElementById('status');
        statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
        
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A1:V500?key=${API_KEY}`;
            const response = await fetch(url);
            
            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error("خطأ 403: تأكد من مشاركة الجدول كـ 'عام'");
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            const rows = data.values;
            
            if (!rows || rows.length < 2) {
                throw new Error("لا توجد بيانات في الجدول");
            }
            
            log(`✅ تم جلب ${rows.length} صف من البيانات`, 'success');
            
            const events = [];
            let count = 0;
            
            // البدء من الصف 2 (تخطي العناوين)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;
                
                const name = row[1] || 'غير محدد';      // العمود B
                const phone = row[2] || '';             // العمود C
                const city = row[6] || '';              // العمود G
                const address = row[7] || '';           // العمود H
                const notes = row[8] || '';             // العمود I
                
                // تاريخ المعاينة من العمود O (index 14)
                const appointmentDate = row[14];
                const appointmentTime = row[15] || '';   // الوقت من العمود P
                
                if (appointmentDate && appointmentDate.toString().trim()) {
                    const dateObj = parseDate(appointmentDate);
                    if (dateObj) {
                        events.push({
                            id: i,
                            title: name,
                            date: dateObj,
                            time: appointmentTime,
                            phone: phone,
                            city: city,
                            address: address,
                            notes: notes
                        });
                        count++;
                        log(`✅ المعاينة ${count}: ${name} - ${appointmentDate}`, 'success');
                    }
                }
            }
            
            log(`📊 النتائج: تم العثور على ${count} معاينة`, 'success');
            
            if (count === 0) {
                log(`⚠️ لم يتم العثور على أي معاينات!`, 'error');
            }
            
            statusSpan.innerHTML = `✅ ${count} معاينة`;
            return events;
            
        } catch (error) {
            log(`❌ خطأ: ${error.message}`, 'error');
            statusSpan.innerHTML = '❌ فشل الجلب';
            return [];
        }
    }
    
    function updateStats(events) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const weekLater = new Date(today);
        weekLater.setDate(today.getDate() + 7);
        
        const monthLater = new Date(today);
        monthLater.setDate(today.getDate() + 30);
        
        const total = events.length;
        const todayCount = events.filter(e => {
            const evDate = new Date(e.date);
            evDate.setHours(0, 0, 0, 0);
            return evDate.getTime() === today.getTime();
        }).length;
        
        const weekCount = events.filter(e => {
            const evDate = new Date(e.date);
            evDate.setHours(0, 0, 0, 0);
            return evDate >= today && evDate <= weekLater;
        }).length;
        
        const monthCount = events.filter(e => {
            const evDate = new Date(e.date);
            evDate.setHours(0, 0, 0, 0);
            return evDate >= today && evDate <= monthLater;
        }).length;
        
        document.getElementById('totalApp').innerText = total;
        document.getElementById('todayApp').innerText = todayCount;
        document.getElementById('weekApp').innerText = weekCount;
        document.getElementById('monthApp').innerText = monthCount;
    }
    
    function renderEventList(events) {
        const container = document.getElementById('eventList');
        if (events.length === 0) {
            container.innerHTML = '<div class="loading"><p>لا توجد معاينات</p></div>';
            return;
        }
        
        // ترتيب حسب التاريخ
        const sorted = [...events].sort((a, b) => a.date - b.date);
        
        let html = '';
        for (const ev of sorted) {
            const dateStr = ev.date.toLocaleDateString('ar-EG', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
            html += `<div class="event-item" onclick="alert('${ev.title}\\n📅 ${dateStr}\\n📞 ${ev.phone || 'غير متوفر'}\\n📍 ${ev.city || ''} ${ev.address || ''}\\n📝 ${ev.notes || ''}')">
                <div class="event-title"><span><i class="fas fa-building"></i> ${ev.title}</span></div>
                <div class="event-details">📅 ${dateStr} ${ev.time ? `🕐 ${ev.time}` : ''}<br>📞 ${ev.phone || 'غير متوفر'}</div>
            </div>`;
        }
        container.innerHTML = html;
    }
    
    function initCalendar(events) {
        const calendarEl = document.getElementById('calendar');
        if (calendar) calendar.destroy();
        
        if (events.length === 0) {
            calendarEl.innerHTML = '<div class="loading"><p>لا توجد معاينات</p></div>';
            return;
        }
        
        const fcEvents = events.map(ev => ({
            id: ev.id,
            title: ev.title,
            start: ev.date,
            backgroundColor: '#c9a03d',
            extendedProps: { phone: ev.phone, city: ev.city, address: ev.address, notes: ev.notes }
        }));
        
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ar',
            direction: 'rtl',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listWeek'
            },
            buttonText: { today: 'اليوم', month: 'شهر', week: 'أسبوع', list: 'قائمة' },
            events: fcEvents,
            eventClick: (info) => {
                const ev = info.event;
                const ext = ev.extendedProps;
                alert(`${ev.title}\n📅 ${ev.start.toLocaleDateString('ar-EG')}\n📞 ${ext.phone || 'غير متوفر'}\n📍 ${ext.city || ''} ${ext.address || ''}\n📝 ${ext.notes || ''}`);
            },
            height: 'auto',
            firstDay: 6
        });
        calendar.render();
        log(`📅 تم تحديث التقويم بـ ${fcEvents.length} معاينة`, 'success');
    }
    
    async function refreshDashboard() {
        const events = await fetchData();
        allEvents = events;
        updateStats(events);
        renderEventList(events);
        initCalendar(events);
    }
    
    window.addEventListener('load', () => {
        log('🚀 بدء تشغيل التطبيق - نظام إدارة العقارات', 'success');
        document.getElementById('refreshBtn').addEventListener('click', refreshDashboard);
        refreshDashboard();
        setInterval(refreshDashboard, 300000);
    });
</script>
</body>
</html>
