<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة المعاينات والمتابعات - لوحة تحكم متطورة</title>
    <!-- FullCalendar CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        /* animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveDots 20s linear infinite;
        }

        @keyframes moveDots {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px 32px;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .header:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e5f4b, #2c9b77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            background: none;
            -webkit-text-fill-color: #2c9b77;
            font-size: 2rem;
        }

        h1 small {
            font-size: 0.7rem;
            background: #e9f3ef;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: normal;
            -webkit-text-fill-color: #1e5f4b;
        }

        /* Filter Buttons */
        .filter-group {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 60px;
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            color: #5c6b66;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .filter-btn i {
            font-size: 1.1rem;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #1e5f4b, #2c9b77);
            color: white;
            box-shadow: 0 4px 15px rgba(44,155,119,0.4);
            transform: scale(1.02);
        }

        .filter-btn:hover:not(.active) {
            background: rgba(44,155,119,0.1);
            transform: translateY(-2px);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #1e5f4b, #2c9b77);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,95,75,0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 22px 24px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #2c9b77, #1e5f4b);
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .stat-card h3 {
            margin: 0 0 12px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6c7a74;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e5f4b, #2c9b77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Content */
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .calendar-panel, .events-panel {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.3s;
        }

        .calendar-panel:hover, .events-panel:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .calendar-panel { flex: 2; min-width: 300px; }
        .events-panel { flex: 1.2; min-width: 280px; }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2efe9;
            color: #2c7a5e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-info {
            font-size: 0.8rem;
            background: #f0f7f0;
            padding: 5px 12px;
            border-radius: 20px;
            color: #2c9b77;
        }

        /* Event List */
        .event-list {
            max-height: 550px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .event-list::-webkit-scrollbar {
            width: 6px;
        }

        .event-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .event-list::-webkit-scrollbar-thumb {
            background: #2c9b77;
            border-radius: 10px;
        }

        .event-item {
            background: #f9fbfa;
            margin-bottom: 14px;
            padding: 16px;
            border-radius: 20px;
            border-right: 4px solid #2c9b77;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .event-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(44,155,119,0.1), transparent);
            transition: left 0.5s;
        }

        .event-item:hover::after {
            left: 100%;
        }

        .event-item:hover {
            transform: translateX(-8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .event-item.callback {
            border-right-color: #f4b942;
        }

        .event-title {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .event-type {
            font-size: 0.7rem;
            background: #deede7;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .event-type.callback-badge {
            background: #ffecb3;
            color: #b45f06;
        }

        .event-details {
            font-size: 0.8rem;
            color: #4a5b54;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .event-details span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2efe9;
            border-top: 4px solid #2c9b77;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 780px) {
            body { padding: 12px; }
            .header { padding: 15px 20px; }
            .filter-btn { padding: 6px 14px; font-size: 0.8rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="dashboard-container">
    <div class="header">
        <h1>
            <i class="fas fa-tooth"></i>
            نظام المعاينات والمتابعات
            <small>ذكي ومتطور</small>
        </h1>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-globe"></i> الكل
                </button>
                <button class="filter-btn" data-filter="appointment">
                    <i class="fas fa-home"></i> معاينات
                </button>
                <button class="filter-btn" data-filter="callback">
                    <i class="fas fa-phone-alt"></i> متابعات
                </button>
            </div>
            <button class="refresh-btn" id="refreshDataBtn">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
            <span class="status-badge" id="syncStatus">
                <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
            </span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" id="statAppointments">
            <h3><i class="fas fa-home"></i> إجمالي المعاينات</h3>
            <div class="stat-number" id="totalAppointments">0</div>
        </div>
        <div class="stat-card" id="statCallbacks">
            <h3><i class="fas fa-phone-alt"></i> إجمالي المتابعات</h3>
            <div class="stat-number" id="totalCallbacks">0</div>
        </div>
        <div class="stat-card" id="statUpcoming">
            <h3><i class="fas fa-calendar-day"></i> المعاينات القادمة</h3>
            <div class="stat-number" id="upcomingAppointments">0</div>
        </div>
        <div class="stat-card" id="statWeek">
            <h3><i class="fas fa-calendar-week"></i> متابعات هذا الأسبوع</h3>
            <div class="stat-number" id="weekCallbacks">0</div>
        </div>
    </div>

    <div class="two-columns">
        <div class="calendar-panel">
            <div class="section-title">
                <span><i class="fas fa-calendar-alt"></i> التقويم التفاعلي</span>
                <span class="filter-info" id="filterInfo"><i class="fas fa-eye"></i> عرض الكل</span>
            </div>
            <div id="calendar"></div>
        </div>
        <div class="events-panel">
            <div class="section-title">
                <span><i class="fas fa-list"></i> الأحداث القادمة (7 أيام)</span>
                <span class="filter-info" id="listFilterInfo">الكل</span>
            </div>
            <div id="upcomingEventsList" class="event-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات...</p>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> بيانات آمنة ومشفرة | يتم التحديث تلقائياً | 
        <i class="fas fa-chart-line"></i> إحصائيات فورية
    </div>
</div>

<script>
    // ======================= إعدادات Google Sheets =======================
    const SPREADSHEET_ID = '1oZMWwvTHATw4Eoehm6URoysFwp3ylm8Bb0udy-qG1zg';
    const SHEET_NAME = 'مبيعات';
    const API_KEY = 'AIzaSyCkoMx_6tPVCPpnnBCzoQjNYovnVaRgjbM';
    
    let originalEvents = [];
    let filteredEvents = [];
    let calendarInstance = null;
    let currentFilter = 'all';
    
    const TYPE_APPOINTMENT = 'معاينة';
    const TYPE_CALLBACK = 'متابعة';
    
    // Show toast notification
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerHTML = type === 'success' 
            ? `<i class="fas fa-check-circle" style="color: #16a34a;"></i> ${message}`
            : `<i class="fas fa-exclamation-circle" style="color: #dc2626;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function setFilter(filter) {
        currentFilter = filter;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === filter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        applyFilter();
        
        const filterText = filter === 'all' ? 'عرض الكل' : (filter === 'appointment' ? 'معاينات فقط' : 'متابعات فقط');
        document.getElementById('filterInfo').innerHTML = `<i class="fas fa-eye"></i> ${filterText}`;
        document.getElementById('listFilterInfo').innerHTML = filterText;
        
        renderUpcomingList(filteredEvents);
        initCalendar(filteredEvents);
        showToast(`تم التصفية: ${filterText}`, 'success');
    }
    
    function applyFilter() {
        if (currentFilter === 'all') {
            filteredEvents = [...originalEvents];
        } else if (currentFilter === 'appointment') {
            filteredEvents = originalEvents.filter(e => e.type === TYPE_APPOINTMENT);
        } else if (currentFilter === 'callback') {
            filteredEvents = originalEvents.filter(e => e.type === TYPE_CALLBACK);
        }
        updateStats(filteredEvents);
    }
    
    async function fetchRealSheetData() {
        const statusSpan = document.getElementById('syncStatus');
        statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جلب البيانات...';
        statusSpan.className = 'status-badge';
        
        try {
            const range = `${SHEET_NAME}!A1:V1000`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            
            const response = await fetch(url);
            
            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error("صلاحيات الوصول مطلوبة");
                } else if (response.status === 404) {
                    throw new Error("الجدول غير موجود");
                } else {
                    throw new Error(`خطأ ${response.status}`);
                }
            }
            
            const data = await response.json();
            const rows = data.values;
            
            if (!rows || rows.length < 2) {
                throw new Error("لا توجد بيانات في الجدول");
            }
            
            const events = [];
            let appointmentCount = 0, callbackCount = 0;
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 15) continue;
                
                const name = row[1] || 'غير محدد';
                const phone = row[2] || row[12] || '';
                const appointmentDateRaw = row[14] || '';
                const appointmentTime = row[15] || '';
                const callbackDateRaw = row[11] || '';
                const callbackNotes = row[13] || '';
                const generalNotes = row[8] || '';
                
                if (appointmentDateRaw && appointmentDateRaw.toString().trim() !== '') {
                    let fullDate = parseDate(appointmentDateRaw, appointmentTime);
                    if (fullDate) {
                        events.push({
                            id: `app_${i}`,
                            title: name,
                            type: TYPE_APPOINTMENT,
                            start: fullDate,
                            dateStr: appointmentDateRaw,
                            time: appointmentTime,
                            phone: phone,
                            notes: generalNotes || callbackNotes || 'لا توجد ملاحظات'
                        });
                        appointmentCount++;
                    }
                }
                
                if (callbackDateRaw && callbackDateRaw.toString().trim() !== '') {
                    let fullDate = parseDate(callbackDateRaw, '');
                    if (fullDate) {
                        events.push({
                            id: `cb_${i}`,
                            title: name,
                            type: TYPE_CALLBACK,
                            start: fullDate,
                            dateStr: callbackDateRaw,
                            time: '',
                            phone: row[12] || phone,
                            notes: callbackNotes || generalNotes || 'لا توجد ملاحظات'
                        });
                        callbackCount++;
                    }
                }
            }
            
            if (events.length === 0) {
                throw new Error("لم يتم العثور على مواعيد");
            }
            
            statusSpan.innerHTML = `<i class="fas fa-check-circle"></i> ${events.length} حدث (${appointmentCount} معاينة، ${callbackCount} متابعة)`;
            statusSpan.className = 'status-badge success';
            showToast(`تم جلب ${events.length} حدث بنجاح`, 'success');
            return events;
            
        } catch (error) {
            statusSpan.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${error.message}`;
            statusSpan.className = 'status-badge error';
            showToast(error.message, 'error');
            return [];
        }
    }
    
    function parseDate(dateStr, timeStr) {
        if (!dateStr) return null;
        
        let cleaned = dateStr.toString().trim();
        let year, month, day;
        
        let match = cleaned.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (match) {
            year = parseInt(match[1]);
            month = parseInt(match[2]) - 1;
            day = parseInt(match[3]);
        } else {
            match = cleaned.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if (match) {
                day = parseInt(match[1]);
                month = parseInt(match[2]) - 1;
                year = parseInt(match[3]);
            } else {
                let d = new Date(cleaned);
                if (!isNaN(d.getTime())) return d;
                return null;
            }
        }
        
        let hour = 12, minute = 0;
        if (timeStr && timeStr.trim()) {
            let timeParts = timeStr.trim().match(/(\d{1,2}):(\d{2})/);
            if (timeParts) {
                hour = parseInt(timeParts[1]);
                minute = parseInt(timeParts[2]);
            }
        }
        
        let dateObj = new Date(year, month, day, hour, minute);
        return isNaN(dateObj.getTime()) ? null : dateObj;
    }
    
    function updateStats(events) {
        const totalApp = events.filter(e => e.type === TYPE_APPOINTMENT).length;
        const totalCb = events.filter(e => e.type === TYPE_CALLBACK).length;
        
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const upcomingApps = events.filter(e => e.type === TYPE_APPOINTMENT && new Date(e.start) >= now).length;
        
        const weekLater = new Date(now);
        weekLater.setDate(now.getDate() + 7);
        const weekCb = events.filter(e => {
            const d = new Date(e.start);
            return e.type === TYPE_CALLBACK && d >= now && d <= weekLater;
        }).length;
        
        document.getElementById('totalAppointments').innerText = totalApp;
        document.getElementById('totalCallbacks').innerText = totalCb;
        document.getElementById('upcomingAppointments').innerText = upcomingApps;
        document.getElementById('weekCallbacks').innerText = weekCb;
    }
    
    function renderUpcomingList(events) {
        const container = document.getElementById('upcomingEventsList');
        
        if (events.length === 0) {
            container.innerHTML = '<div class="loading"><i class="fas fa-calendar-times" style="font-size: 3rem; opacity: 0.5;"></i><p>لا توجد أحداث للعرض</p></div>';
            return;
        }
        
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const limit = new Date(now);
        limit.setDate(now.getDate() + 7);
        
        const upcoming = events.filter(ev => {
            const evDate = new Date(ev.start);
            evDate.setHours(0, 0, 0, 0);
            return evDate >= now && evDate <= limit;
        }).sort((a, b) => a.start - b.start);
        
        if (upcoming.length === 0) {
            container.innerHTML = '<div class="loading"><i class="fas fa-smile-wink" style="font-size: 3rem; opacity: 0.5;"></i><p>لا توجد أحداث قريبة</p></div>';
            return;
        }
        
        let html = '';
        for (const ev of upcoming) {
            const dateStr = ev.start.toLocaleDateString('ar-EG', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            const timeStr = ev.time || (ev.start.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }));
            const isCallback = ev.type === TYPE_CALLBACK;
            html += `
                <div class="event-item ${isCallback ? 'callback' : ''}" onclick="showEventDetails('${ev.title.replace(/'/g, "\\'")}', '${ev.phone || 'غير متوفر'}', '${ev.notes.replace(/'/g, "\\'")}', '${ev.type}')">
                    <div class="event-title">
                        <span><i class="fas fa-user-circle"></i> ${ev.title}</span>
                        <span class="event-type ${isCallback ? 'callback-badge' : ''}">
                            <i class="fas ${isCallback ? 'fa-phone-alt' : 'fa-home'}"></i> ${ev.type}
                        </span>
                    </div>
                    <div class="event-details">
                        <span><i class="far fa-calendar-alt"></i> ${dateStr}</span>
                        <span><i class="far fa-clock"></i> ${timeStr}</span>
                        <span><i class="fas fa-phone"></i> ${ev.phone || 'غير متوفر'}</span>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function showEventDetails(title, phone, notes, type) {
        Swal.fire({
            title: title,
            html: `
                <div style="text-align: right; direction: rtl;">
                    <p><i class="fas fa-tag"></i> <strong>النوع:</strong> ${type}</p>
                    <p><i class="fas fa-phone"></i> <strong>رقم الهاتف:</strong> ${phone}</p>
                    <p><i class="fas fa-sticky-note"></i> <strong>الملاحظات:</strong> ${notes}</p>
                </div>
            `,
            icon: type === 'معاينة' ? 'info' : 'warning',
            confirmButtonText: 'إغلاق',
            confirmButtonColor: '#2c9b77',
            background: 'white',
            backdrop: true
        });
    }
    
    function initCalendar(events) {
        const calendarEl = document.getElementById('calendar');
        if (calendarInstance) calendarInstance.destroy();
        
        if (events.length === 0) return;
        
        const fcEvents = events.map(ev => ({
            id: ev.id,
            title: `${ev.type === TYPE_APPOINTMENT ? '🏠' : '📞'} ${ev.title}`,
            start: ev.start,
            backgroundColor: ev.type === TYPE_APPOINTMENT ? '#2c9b77' : '#f4b942',
            borderColor: ev.type === TYPE_APPOINTMENT ? '#1e6b51' : '#dd9d2b',
            extendedProps: { phone: ev.phone, notes: ev.notes, type: ev.type }
        }));
        
        calendarInstance = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ar',
            direction: 'rtl',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            events: fcEvents,
            eventClick: (info) => {
                const ext = info.event.extendedProps;
                showEventDetails(info.event.title.replace(/^[🏠📞] /, ''), ext.phone, ext.notes, ext.type);
            },
            height: 'auto',
            firstDay: 6,
            buttonText: {
                today: 'اليوم',
                month: 'شهر',
                week: 'أسبوع',
                list: 'قائمة'
            }
        });
        calendarInstance.render();
    }
    
    async function refreshDashboard() {
        const realEvents = await fetchRealSheetData();
        
        if (realEvents.length > 0) {
            originalEvents = realEvents;
            applyFilter();
            showToast(`تم تحديث البيانات - ${originalEvents.length} حدث`, 'success');
        } else {
            originalEvents = [];
            filteredEvents = [];
            updateStats([]);
            renderUpcomingList([]);
            initCalendar([]);
        }
    }
    
    function initFilters() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });
    }
    
    window.addEventListener('load', () => {
        initFilters();
        refreshDashboard();
        document.getElementById('refreshDataBtn').addEventListener('click', refreshDashboard);
        
        // تحديث تلقائي كل 5 دقائق
        setInterval(refreshDashboard, 300000);
    });
</script>
</body>
</html>
